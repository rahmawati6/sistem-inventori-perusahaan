name: Laporan Bug
description: Laporkan perilaku aplikasi yang tidak berjalan semestinya
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Terima kasih telah membantu meningkatkan Inventory Cloud.
  - type: textarea
    id: description
    attributes:
      label: Deskripsi bug
      description: Jelaskan masalah yang terjadi secara ringkas dan jelas.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Langkah reproduksi
      placeholder: |
        1. Buka halaman ...
        2. Klik ...
        3. Lihat kesalahan ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Perilaku yang diharapkan
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Lingkungan
      description: Sistem operasi, browser, versi PHP, dan versi Node.js jika relevan.
      placeholder: Windows 11, Chrome 126, PHP 8.2, Node.js 20
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Informasi tambahan
      description: Tambahkan log atau screenshot yang sudah disamarkan. Jangan sertakan data sensitif.
  - type: checkboxes
    id: terms
    attributes:
      label: Konfirmasi
      options:
        - label: Saya sudah mencari issue serupa dan tidak menemukan duplikat.
          required: true
